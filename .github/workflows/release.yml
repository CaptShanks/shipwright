name: Release CLI

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o ship-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/ship

      - uses: actions/upload-artifact@v4
        with:
          name: ship-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/ship-*

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum ship-* > checksums.txt

      - name: Build release notes
        id: notes
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            RANGE_DESC="Initial release"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            RANGE_DESC="Changes since ${PREV_TAG}"
          fi

          CLI_COMMITS=$(git log "$RANGE" --format='- %s (%h)' -- cli/ || true)
          OTHER_COMMITS=$(git log "$RANGE" --format='- %s (%h)' -- ':!cli/' || true)

          {
            echo '## Install'
            echo
            echo '**Via Go:**'
            echo '```bash'
            echo 'go install github.com/CaptShanks/shipwright/cli/cmd/ship@latest'
            echo '```'
            echo
            echo '**Via binary:** download the appropriate archive below, extract, and place `ship` in your PATH.'
          } > release-body.md

          printf '\n## %s\n\n' "$RANGE_DESC" >> release-body.md

          if [ -n "$CLI_COMMITS" ]; then
            printf '### CLI\n\n%s\n' "$CLI_COMMITS" >> release-body.md
          fi

          if [ -n "$OTHER_COMMITS" ]; then
            printf '\n### Other\n\n%s\n' "$OTHER_COMMITS" >> release-body.md
          fi

          if [ -z "$CLI_COMMITS" ] && [ -z "$OTHER_COMMITS" ]; then
            echo "No changes in this release." >> release-body.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            artifacts/ship-*
            artifacts/checksums.txt
