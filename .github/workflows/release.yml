name: Release CLI

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o ship-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/ship

      - uses: actions/upload-artifact@v4
        with:
          name: ship-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/ship-*

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
            echo "desc=all commits up to ${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
            echo "desc=${PREV_TAG} to ${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect git history
        id: history
        run: |
          {
            echo 'GIT_LOG<<__EOF__'
            git log ${{ steps.range.outputs.range }} \
              --format='%h %s (%an, %as)' -- cli/
            echo '__EOF__'
          } >> "$GITHUB_ENV"

      - name: Generate changelog with AI agent
        id: changelog
        uses: ./actions/run-ai-agent
        with:
          ai-provider: codex
          agent-role: changelog-generator
          agent-prompt: |
            Generate a changelog for the Ship CLI release ${{ github.ref_name }}.
            Commit range: ${{ steps.range.outputs.desc }}

            Focus only on changes under the cli/ directory.
            Format for a GitHub Release (markdown).
            Keep it concise — this is a CLI tool, not a library.

            Git log:
            ${{ env.GIT_LOG }}
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}

  release:
    name: Create GitHub Release
    needs: [build, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum ship-* > checksums.txt

      - name: Write release body
        run: |
          cat > release-body.md << 'HEADER'
          ## Install

          **Via Go:**
          ```bash
          go install github.com/CaptShanks/shipwright/cli/cmd/ship@${{ github.ref_name }}
          ```

          **Via binary:** download the appropriate archive below, extract, and place `ship` in your PATH.

          ---

          HEADER

          CHANGELOG='${{ needs.changelog.outputs.changelog }}'
          if [ -n "$CHANGELOG" ]; then
            echo "$CHANGELOG" >> release-body.md
          else
            echo "See [commit history](https://github.com/CaptShanks/shipwright/compare/...${GITHUB_REF_NAME}) for changes." >> release-body.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            artifacts/ship-*
            artifacts/checksums.txt
