name: Run AI agent
description: >
  Run a Shipwright agent prompt against a supported AI provider (Codex, Claude Code, GitHub Models).
  Loads the role-specific agent definition from this repository, optionally merges project context,
  and invokes the provider with a unified prompt.

inputs:
  ai-provider:
    description: 'AI backend to use. One of: codex, claude, github-models.'
    required: false
    default: 'codex'
  model:
    description: 'Model name (e.g. gpt-4o-mini for github-models, claude-sonnet-4-20250514 for claude).'
    required: false
    default: ''
  agent-role:
    description: >
      Which agent definition to load. One of: triage, architect, implementer, test-engineer,
      security-reviewer, pr-reviewer, changelog-generator, codebase-analyzer.
    required: true
  agent-prompt:
    description: Full user/task prompt for the agent (ignored if agent-prompt-file is set).
    required: false
    default: ''
  agent-prompt-file:
    description: Path to a file containing the user/task prompt (takes precedence over agent-prompt).
    required: false
    default: ''
  project-context-path:
    description: >
      Optional path to a project knowledge file (e.g. CLAUDE.md or .github/shipwright/project-context.md),
      relative to the repository root. When empty, no project context is injected.
    required: false
    default: ''
  working-directory:
    description: Working directory for the agent, relative to the repository root.
    required: false
    default: '.'
  max-tokens:
    description: >
      Target maximum tokens for the model response. Used for Codex/GitHub Models providers.
    required: false
    default: '16384'
  timeout-minutes:
    description: Step timeout (minutes) for provider execution.
    required: false
    default: '30'
  additional-skills:
    description: >
      Comma-separated list of skill names to inject into the prompt (e.g. "go-development,terraform-development").
      Each name is resolved to plugins/<name>/skills/<name>/SKILL.md within the shipwright repo.
      Use this for language/framework-specific skills that are not bundled with the agent.
    required: false
    default: ''

  # Claude-specific inputs
  claude-code-oauth-token:
    description: 'OAuth token from Claude Code GitHub App (required when ai-provider is claude).'
    required: false
    default: ''
  max-turns:
    description: 'Max Claude Code turns (claude provider only).'
    required: false
    default: '15'
  allowed-tools:
    description: >
      Comma-separated list of allowed tools for Claude Code (claude provider only).
      If empty, a sensible default is chosen based on agent-role.
    required: false
    default: ''
  allowed-bots:
    description: 'Bot logins permitted to trigger the action (claude provider only).'
    required: false
    default: 'claude[bot]'
  use-sticky-comment:
    description: 'Whether to use sticky (updateable) comments (claude provider only).'
    required: false
    default: 'true'
  trigger-phrase:
    description: 'Trigger phrase for claude-code-action. Set to "none-disabled" for prompt-driven workflows.'
    required: false
    default: 'none-disabled'

outputs:
  result:
    description: Primary text output from the AI agent.
    value: ${{ steps.run_codex.outputs['final-message'] || steps.run_github_models.outputs.result || '' }}
  exit-code:
    description: Exit code for a successful run (0). Unset if a prior step failed.
    value: ${{ steps.record_exit.outputs.code }}

runs:
  using: composite
  steps:
    # ── Validation ──
    - name: Validate inputs
      shell: bash
      env:
        AI_PROVIDER: ${{ inputs.ai-provider }}
        AGENT_ROLE: ${{ inputs.agent-role }}
        AGENT_PROMPT: ${{ inputs.agent-prompt }}
        AGENT_PROMPT_FILE: ${{ inputs.agent-prompt-file }}
        CLAUDE_TOKEN: ${{ inputs.claude-code-oauth-token }}
      run: |
        set -euo pipefail

        if [ -z "$AGENT_PROMPT" ] && [ -z "$AGENT_PROMPT_FILE" ]; then
          echo "Either agent-prompt or agent-prompt-file must be provided" >&2
          exit 1
        fi
        if [ -n "$AGENT_PROMPT_FILE" ] && [ ! -f "$AGENT_PROMPT_FILE" ]; then
          echo "agent-prompt-file not found: $AGENT_PROMPT_FILE" >&2
          exit 1
        fi

        case "$AI_PROVIDER" in
          codex|claude|github-models) ;;
          *)
            echo "Invalid ai-provider: $AI_PROVIDER (expected codex, claude, or github-models)" >&2
            exit 1
            ;;
        esac

        if [ "$AI_PROVIDER" = "claude" ] && [ -z "$CLAUDE_TOKEN" ]; then
          echo "claude-code-oauth-token is required when ai-provider is claude" >&2
          exit 1
        fi

        case "$AGENT_ROLE" in
          triage|architect|implementer|test-engineer|security-reviewer|pr-reviewer|changelog-generator|codebase-analyzer) ;;
          *)
            echo "Invalid agent-role: $AGENT_ROLE" >&2
            exit 1
            ;;
        esac

    # ── Load context layers ──
    - name: Load project context
      shell: bash
      env:
        CONTEXT_PATH: ${{ inputs.project-context-path }}
      run: |
        set -euo pipefail

        if [ -z "$CONTEXT_PATH" ]; then
          echo "PROJECT_CONTEXT=" >> "$GITHUB_ENV"
          exit 0
        fi

        ROOT="${GITHUB_WORKSPACE}"
        FILE="$ROOT/$CONTEXT_PATH"
        if [ ! -f "$FILE" ]; then
          echo "project-context-path not found: $FILE" >&2
          exit 1
        fi

        {
          echo 'PROJECT_CONTEXT<<__SHIPWRIGHT_CTX_EOF__'
          cat "$FILE"
          echo '__SHIPWRIGHT_CTX_EOF__'
        } >> "$GITHUB_ENV"

    - name: Load agent definition
      shell: bash
      env:
        AGENT_ROLE: ${{ inputs.agent-role }}
      run: |
        set -euo pipefail

        case "$AGENT_ROLE" in
          triage)
            rel='../../plugins/triage-agent/agents/triage.md'
            ;;
          architect)
            rel='../../plugins/architect-agent/agents/architect.md'
            ;;
          implementer)
            rel='../../plugins/implementer-agent/agents/implementer.md'
            ;;
          test-engineer)
            rel='../../plugins/test-engineer/agents/test-engineer.md'
            ;;
          security-reviewer)
            rel='../../plugins/security-reviewer/agents/security-reviewer.md'
            ;;
          pr-reviewer)
            rel='../../plugins/pr-reviewer/agents/pr-reviewer.md'
            ;;
          changelog-generator)
            rel='../../plugins/changelog-generator/agents/changelog-generator.md'
            ;;
          codebase-analyzer)
            rel='../../plugins/codebase-analyzer/agents/codebase-analyzer.md'
            ;;
          *)
            echo "Unhandled agent-role: $AGENT_ROLE" >&2
            exit 1
            ;;
        esac

        AGENT_FILE="$(cd "$GITHUB_ACTION_PATH" && cd "$(dirname "$rel")" && pwd)/$(basename "$rel")"
        if [ ! -f "$AGENT_FILE" ]; then
          echo "Agent definition missing: $AGENT_FILE" >&2
          exit 1
        fi

        {
          echo 'AGENT_DEFINITION<<__SHIPWRIGHT_AGENT_EOF__'
          cat "$AGENT_FILE"
          echo '__SHIPWRIGHT_AGENT_EOF__'
        } >> "$GITHUB_ENV"

    - name: Load additional skills
      shell: bash
      env:
        SKILL_NAMES: ${{ inputs.additional-skills }}
      run: |
        set -euo pipefail

        if [ -z "$SKILL_NAMES" ]; then
          echo "ADDITIONAL_SKILLS=" >> "$GITHUB_ENV"
          exit 0
        fi

        skills_content=""
        IFS=',' read -ra SKILLS <<< "$SKILL_NAMES"
        for skill in "${SKILLS[@]}"; do
          skill="$(echo "$skill" | xargs)"
          [ -z "$skill" ] && continue

          SKILL_FILE="$(cd "$GITHUB_ACTION_PATH" && cd "../../plugins/${skill}/skills/${skill}" && pwd)/SKILL.md"
          if [ ! -f "$SKILL_FILE" ]; then
            echo "::warning::Skill not found: ${skill} (expected at plugins/${skill}/skills/${skill}/SKILL.md)"
            continue
          fi

          echo "Loading skill: ${skill}"
          skills_content="${skills_content}$(printf '\n\n---\n\n')$(cat "$SKILL_FILE")"
        done

        {
          echo 'ADDITIONAL_SKILLS<<__SHIPWRIGHT_SKILLS_EOF__'
          printf '%s' "$skills_content"
          echo
          echo '__SHIPWRIGHT_SKILLS_EOF__'
        } >> "$GITHUB_ENV"

    # ── Construct prompt (used by Codex and GitHub Models) ──
    - name: Construct full prompt
      shell: bash
      env:
        USER_PROMPT: ${{ inputs.agent-prompt }}
        USER_PROMPT_FILE: ${{ inputs.agent-prompt-file }}
        MAX_TOKENS: ${{ inputs.max-tokens }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        AI_PROVIDER: ${{ inputs.ai-provider }}
      run: |
        set -euo pipefail

        agent_def="$AGENT_DEFINITION"
        project_ctx="$PROJECT_CONTEXT"

        if [ "$AI_PROVIDER" = "github-models" ]; then
          agent_def="$(printf '%s' "$agent_def" | head -c 3000)"
          project_ctx="$(printf '%s' "$project_ctx" | head -c 2000)"
        fi

        if [ -n "$USER_PROMPT_FILE" ] && [ -f "$USER_PROMPT_FILE" ]; then
          user_prompt="$(cat "$USER_PROMPT_FILE")"
        else
          user_prompt="$USER_PROMPT"
        fi

        skills_ctx="$ADDITIONAL_SKILLS"
        if [ "$AI_PROVIDER" = "github-models" ]; then
          skills_ctx="$(printf '%s' "$skills_ctx" | head -c 2000)"
        fi

        PROMPT_FILE="${RUNNER_TEMP}/shipwright_full_prompt.txt"
        {
          echo '# Agent definition'
          echo
          printf '%s\n' "$agent_def"
          if [ -n "$skills_ctx" ]; then
            echo
            echo '# Additional skills'
            echo
            printf '%s\n' "$skills_ctx"
          fi
          echo
          echo '# Project context'
          echo
          printf '%s\n' "$project_ctx"
          echo
          echo '# Task'
          echo
          printf '%s\n' "$user_prompt"
        } > "$PROMPT_FILE"

        echo "PROMPT_FILE=${PROMPT_FILE}" >> "$GITHUB_ENV"

        # Also store the user prompt separately for Claude's prompt input
        {
          echo 'SHIPWRIGHT_USER_PROMPT<<__SHIPWRIGHT_UP_EOF__'
          printf '%s\n' "$user_prompt"
          echo '__SHIPWRIGHT_UP_EOF__'
        } >> "$GITHUB_ENV"

    # ── Provider: Codex ──
    - name: Run Codex
      id: run_codex
      if: ${{ inputs.ai-provider == 'codex' }}
      uses: openai/codex-action@v1
      env:
        OPENAI_API_KEY: ${{ env.AI_API_KEY }}
      with:
        prompt-file: ${{ env.PROMPT_FILE }}
        openai-api-key: ${{ env.AI_API_KEY }}
        working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}
        sandbox: ${{ (inputs.agent-role == 'implementer' || inputs.agent-role == 'test-engineer') && 'workspace-write' || 'read-only' }}

    # ── Provider: GitHub Models ──
    - name: Run GitHub Models
      id: run_github_models
      if: ${{ inputs.ai-provider == 'github-models' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.AI_API_KEY }}
        MODEL: ${{ inputs.model || 'gpt-4o-mini' }}
        PROMPT_FILE: ${{ env.PROMPT_FILE }}
      run: |
        set -euo pipefail

        python3 <<'PY'
        import json
        import os
        import sys
        import urllib.request
        import urllib.error

        token = os.environ["GITHUB_TOKEN"]
        model = os.environ.get("MODEL", "gpt-4o")
        prompt_file = os.environ["PROMPT_FILE"]

        with open(prompt_file, encoding="utf-8") as f:
            prompt = f.read()

        payload = json.dumps({
            "model": model,
            "messages": [{"role": "user", "content": prompt}],
            "temperature": 0.2,
        }).encode()

        req = urllib.request.Request(
            "https://models.inference.ai.azure.com/chat/completions",
            data=payload,
            headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
            },
        )

        try:
            with urllib.request.urlopen(req, timeout=600) as resp:
                body = json.loads(resp.read())
        except urllib.error.HTTPError as exc:
            detail = exc.read().decode(errors="replace")
            print(f"::error::GitHub Models API returned {exc.code}: {detail}", file=sys.stderr)
            sys.exit(1)

        content = body["choices"][0]["message"]["content"]
        usage = body.get("usage", {})
        print(f"Model: {model}  Tokens: prompt={usage.get('prompt_tokens','?')} completion={usage.get('completion_tokens','?')}")

        out_path = os.environ["GITHUB_OUTPUT"]
        delim = "__SHIPWRIGHT_GHM_EOF__"
        with open(out_path, "a", encoding="utf-8") as out:
            out.write(f"result<<{delim}\n")
            out.write(content)
            if not content.endswith("\n"):
                out.write("\n")
            out.write(f"{delim}\n")
        PY

    # ── Provider: Claude Code ──
    - name: Resolve Claude allowed tools
      id: claude_tools
      if: ${{ inputs.ai-provider == 'claude' }}
      shell: bash
      env:
        AGENT_ROLE: ${{ inputs.agent-role }}
        CUSTOM_TOOLS: ${{ inputs.allowed-tools }}
      run: |
        set -euo pipefail

        if [ -n "$CUSTOM_TOOLS" ]; then
          echo "tools=$CUSTOM_TOOLS" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        BASE="Read,Write,Edit,MultiEdit,Glob,Grep,LS"
        case "$AGENT_ROLE" in
          triage)
            echo "tools=Read,Glob,Grep,LS,Bash(gh issue:*),Bash(gh label:*)" >> "$GITHUB_OUTPUT"
            ;;
          architect)
            echo "tools=${BASE},Bash(git:*),Bash(gh:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*)" >> "$GITHUB_OUTPUT"
            ;;
          implementer)
            echo "tools=${BASE},Bash(git:*),Bash(go:*),Bash(goimports:*),Bash(gh:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*)" >> "$GITHUB_OUTPUT"
            ;;
          test-engineer)
            echo "tools=${BASE},Bash(git:*),Bash(go:*),Bash(gh:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*)" >> "$GITHUB_OUTPUT"
            ;;
          security-reviewer|pr-reviewer)
            echo "tools=Read,Glob,Grep,LS,Bash(gh:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(go test:*),Bash(go vet:*)" >> "$GITHUB_OUTPUT"
            ;;
          changelog-generator)
            echo "tools=Read,Glob,Grep,LS,Bash(git:*),Bash(gh:*),Bash(cat:*),Bash(ls:*),Bash(find:*)" >> "$GITHUB_OUTPUT"
            ;;
          codebase-analyzer)
            echo "tools=Read,Glob,Grep,LS,Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(wc:*),Bash(head:*)" >> "$GITHUB_OUTPUT"
            ;;
        esac

    - name: Run Claude Code
      id: run_claude
      if: ${{ inputs.ai-provider == 'claude' }}
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        trigger_phrase: ${{ inputs.trigger-phrase }}
        allowed_bots: ${{ inputs.allowed-bots }}
        use_sticky_comment: ${{ inputs.use-sticky-comment }}
        claude_args: |
          --model ${{ inputs.model || 'claude-sonnet-4-20250514' }}
          --max-turns ${{ inputs.max-turns }}
          --allowedTools "${{ steps.claude_tools.outputs.tools }}"
        prompt: |
          ${{ env.AGENT_DEFINITION }}

          ${{ env.ADDITIONAL_SKILLS }}

          ---

          ${{ env.PROJECT_CONTEXT }}

          ---

          ${{ env.SHIPWRIGHT_USER_PROMPT }}

    # ── Finalize ──
    - name: Record success exit code
      id: record_exit
      if: ${{ success() }}
      shell: bash
      run: echo 'code=0' >> "$GITHUB_OUTPUT"
